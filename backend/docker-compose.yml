version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoicechaser_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoicechaser
      POSTGRES_PASSWORD: invoicechaser
      POSTGRES_DB: invoicechaser
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicechaser"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: invoicechaser_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@invoicechaser.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
